services:
  nginx:
    image: nginx:alpine
    container_name: edge-nginx
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped
    depends_on:
      - web
      - api
      - line-bot

  web:
    image: traefik/whoami
    container_name: svc-web
    restart: unless-stopped

  api:
    image: ghcr.io/aiden4939/inwanding-api:latest
    container_name: svc-api
    restart: unless-stopped
    environment:
      PORT: "3000"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_NAME: "${POSTGRES_DB}"
      DB_USER: "${POSTGRES_USER}"
      DB_PASSWORD: "${POSTGRES_PASSWORD}"
    depends_on:
      - db
    networks:
      - default

  db:
    image: postgres:16-alpine
    container_name: svc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - default

  line-bot:
    image: ghcr.io/aiden4939/line-reminder-bot:latest
    container_name: svc-line-bot
    restart: unless-stopped
    environment:
      PORT: "3000"
      TZ: "Asia/Taipei"
      LINE_CHANNEL_SECRET: "${LINE_CHANNEL_SECRET}"
      LINE_CHANNEL_ACCESS_TOKEN: "${LINE_CHANNEL_ACCESS_TOKEN}"
      DB_HOST: "line-bot-db"
      DB_PORT: "5432"
      DB_NAME: "${LINE_BOT_DB_NAME}"
      DB_USER: "${LINE_BOT_DB_USER}"
      DB_PASSWORD: "${LINE_BOT_DB_PASSWORD}"
    depends_on:
      line-bot-db:
        condition: service_healthy
    networks:
      - default

  line-bot-db:
    image: postgres:16-alpine
    container_name: svc-line-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${LINE_BOT_DB_NAME}"
      POSTGRES_USER: "${LINE_BOT_DB_USER}"
      POSTGRES_PASSWORD: "${LINE_BOT_DB_PASSWORD}"
    volumes:
      - line_bot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LINE_BOT_DB_USER} -d ${LINE_BOT_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default

volumes:
  pg_data:
    external: true
    name: nginx_pg_data
  line_bot_pg_data:
