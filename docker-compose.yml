services:
  nginx:
    image: nginx:alpine
    container_name: edge-nginx
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped
    depends_on:
      - web
      - api
      - line-bot
      - telegram-bot

  web:
    image: traefik/whoami
    container_name: svc-web
    restart: unless-stopped

  api:
    image: ghcr.io/aiden4939/inwanding-api:latest
    container_name: svc-api
    restart: unless-stopped
    environment:
      PORT: "3000"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_NAME: "${POSTGRES_DB}"
      DB_USER: "${POSTGRES_USER}"
      DB_PASSWORD: "${POSTGRES_PASSWORD}"
    depends_on:
      - db
    networks:
      - default

  db:
    image: postgres:16-alpine
    container_name: svc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - default

  line-bot:
    image: ghcr.io/aiden4939/line-reminder-bot:latest
    container_name: svc-line-bot
    restart: unless-stopped
    environment:
      PORT: "3000"
      TZ: "Asia/Taipei"
      LINE_CHANNEL_SECRET: "${LINE_CHANNEL_SECRET}"
      LINE_CHANNEL_ACCESS_TOKEN: "${LINE_CHANNEL_ACCESS_TOKEN}"
      OPENAI_API_KEY: "${LINE_OPENAI_API_KEY:-${TELEGRAM_OPENAI_API_KEY}}"
      LLM_MODEL: "${LINE_BOT_LLM_MODEL:-gpt-4o-mini}"
      NLU_MODE: "${LINE_BOT_NLU_MODE:-hybrid}"
      FLEX_LIST_ENABLED: "${LINE_BOT_FLEX_LIST_ENABLED:-true}"
      DB_HOST: "line-bot-db"
      DB_PORT: "5432"
      DB_NAME: "${LINE_BOT_DB_NAME}"
      DB_USER: "${LINE_BOT_DB_USER}"
      DB_PASSWORD: "${LINE_BOT_DB_PASSWORD}"
    depends_on:
      line-bot-db:
        condition: service_healthy
    networks:
      - default

  line-bot-db:
    image: postgres:16-alpine
    container_name: svc-line-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${LINE_BOT_DB_NAME}"
      POSTGRES_USER: "${LINE_BOT_DB_USER}"
      POSTGRES_PASSWORD: "${LINE_BOT_DB_PASSWORD}"
    volumes:
      - line_bot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LINE_BOT_DB_USER} -d ${LINE_BOT_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default

  telegram-playwright:
    image: ghcr.io/aiden4939/telegram-playwright-service:latest
    container_name: svc-telegram-playwright
    restart: unless-stopped
    networks:
      - default

  telegram-bot:
    image: ghcr.io/aiden4939/telegram-agent-bot:latest
    container_name: svc-telegram-bot
    restart: unless-stopped
    environment:
      PORT: "3001"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      ALLOWED_TELEGRAM_USER_IDS: "${ALLOWED_TELEGRAM_USER_IDS}"
      OPENAI_API_KEY: "${TELEGRAM_OPENAI_API_KEY:-${OPENAI_API_KEY}}"
      LLM_MODEL: "${TELEGRAM_LLM_MODEL:-gpt-4o-mini}"
      INTERNAL_API_SECRET: "${TELEGRAM_INTERNAL_API_SECRET}"
      INTENT_ROUTER: "${TELEGRAM_INTENT_ROUTER:-llm}"
      CURSOR_API_KEY: "${TELEGRAM_CURSOR_API_KEY}"
      AGENT_MODEL: "${TELEGRAM_AGENT_MODEL:-composer-2.5}"
      DEV_RUNTIME: "${TELEGRAM_DEV_RUNTIME:-cloud}"
      CLOUD_REPOS: "${TELEGRAM_CLOUD_REPOS}"
      CLOUD_BASE_BRANCH: "${TELEGRAM_CLOUD_BASE_BRANCH:-main}"
      CLOUD_AUTO_CREATE_PR: "${TELEGRAM_CLOUD_AUTO_CREATE_PR:-true}"
      CLOUD_SKIP_REVIEWER_REQUEST: "${TELEGRAM_CLOUD_SKIP_REVIEWER_REQUEST:-true}"
      DEFAULT_CWD: "${TELEGRAM_DEFAULT_CWD:-/app}"
      ALLOWED_CWD_ROOTS: "${TELEGRAM_ALLOWED_CWD_ROOTS:-/app}"
      DEV_BRIEF_REPLY: "${TELEGRAM_DEV_BRIEF_REPLY:-true}"
      RUN_TIMEOUT_MS: "${TELEGRAM_RUN_TIMEOUT_MS:-600000}"
      SESSION_DB_PATH: "/app/data/bot.db"
      PLAYWRIGHT_SERVICE_URL: "http://telegram-playwright:3100"
      SCRAPE_MODE: "${TELEGRAM_SCRAPE_MODE:-inline}"
      SCRAPE_TIMEOUT_MS: "${TELEGRAM_SCRAPE_TIMEOUT_MS:-120000}"
      TELEGRAM_MODE: "webhook"
      WEBHOOK_PATH: "/telegram/webhook"
      WEBHOOK_URL: "${TELEGRAM_WEBHOOK_URL:-https://tgbot.inwanding.com/telegram/webhook}"
      OPS_ENABLED: "${TELEGRAM_OPS_ENABLED:-true}"
      OPS_DOCKER_ENABLED: "${TELEGRAM_OPS_DOCKER_ENABLED:-false}"
      OPS_ALLOWED_CONTAINERS: "${TELEGRAM_OPS_ALLOWED_CONTAINERS:-svc-telegram-bot,svc-telegram-playwright,svc-line-bot,edge-nginx}"
      OPS_HEALTH_URLS: "${TELEGRAM_OPS_HEALTH_URLS:-}"
      OPS_COMMAND_TIMEOUT_MS: "${TELEGRAM_OPS_COMMAND_TIMEOUT_MS:-30000}"
      OPS_LOG_TAIL_LINES: "${TELEGRAM_OPS_LOG_TAIL_LINES:-50}"
      GITHUB_TOKEN: "${TELEGRAM_GITHUB_TOKEN:-}"
      GITHUB_ALLOWED_REPOS: "${TELEGRAM_GITHUB_ALLOWED_REPOS:-}"
      GITHUB_ISSUE_LIMIT: "${TELEGRAM_GITHUB_ISSUE_LIMIT:-10}"
      TAISHIN_ENABLED: "${TELEGRAM_TAISHIN_ENABLED:-false}"
      TAISHIN_NATIONAL_ID: "${TELEGRAM_TAISHIN_NATIONAL_ID:-}"
      TAISHIN_PASSWORD: "${TELEGRAM_TAISHIN_PASSWORD:-}"
      TAISHIN_CERT_PATH: "${TELEGRAM_TAISHIN_CERT_PATH:-/run/secrets/taishin-cert.p12}"
      TAISHIN_CERT_PASSWORD: "${TELEGRAM_TAISHIN_CERT_PASSWORD:-}"
      TAISHIN_ACCOUNT_ID: "${TELEGRAM_TAISHIN_ACCOUNT_ID:-}"
    volumes:
      - telegram_bot_data:/app/data
    depends_on:
      - telegram-playwright
    networks:
      - default

volumes:
  pg_data:
    external: true
    name: nginx_pg_data
  line_bot_pg_data:
  telegram_bot_data:
