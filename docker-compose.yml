services:
  nginx:
    image: nginx:alpine
    container_name: edge-nginx
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped
    depends_on:
      - web
      - api

  web:
    image: traefik/whoami
    container_name: svc-web
    restart: unless-stopped

  api:
    image: ghcr.io/aiden4939/inwanding-api:latest
    container_name: svc-api
    restart: unless-stopped
    environment:
      PORT: "3000"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_NAME: "${POSTGRES_DB}"
      DB_USER: "${POSTGRES_USER}"
      DB_PASSWORD: "${POSTGRES_PASSWORD}"
    depends_on:
      - db
    networks:
      - default

  db:
    image: postgres:16-alpine
    container_name: svc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - default

volumes:
  pg_data:
    external: true
    name: nginx_pg_data
